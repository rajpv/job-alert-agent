name: Company-Targeted Job Alert

on:
  schedule:
    # Runs once daily at 8:00 AM Pacific (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  company-search:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Company search takes longer (50 companies)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load seen jobs state
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run Company-Targeted Search
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --mode company

      - name: Commit updated state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/seen_jobs.json
          git diff --staged --quiet || git commit -m "Update seen jobs state (company search) [skip ci]"
          git push
